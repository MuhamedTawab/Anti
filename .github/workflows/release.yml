name: 'publish'

on:
  push:
    tags:
      - 'v*' # Trigger on version tags like v1.0.0

jobs:
  publish-tauri:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        platform: [windows-latest] # Build for Windows

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - name: setup node
        uses: actions/setup-node@v4
        with:
          node-version: lts/*

      - name: install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: install dependencies
        run: npm install

      - name: build and release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: v__VERSION__ # The action will automatically replace __VERSION__
          releaseName: 'Nightlink Pro v__VERSION__'
          releaseBody: 'Official Nightlink Desktop release. Download the .msi or .exe below.'
          releaseDraft: true
          prerelease: false
